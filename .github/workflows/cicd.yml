name: CICD

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r "requirements.txt"

      - name: Run integration test with fake
        run: pytest test_integration_with_fake.py -v 
