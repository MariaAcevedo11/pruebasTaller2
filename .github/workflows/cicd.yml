name: CICD

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r orders_app/requirements.txt

      - name: Run integration test with fake
        run: |
         export PYTHONPATH-$GITHUB_WORKSPACE 
         pytest orders_app/test_integration_with_fake.py -v 
